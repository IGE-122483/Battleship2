# IGE-122464 - Guilherme Joaquim
# Code Smell: Long Method (Martin Fowler)
# Deteta métodos com mais de 30 linhas de código (LOC >= 30)
# Baseado em: Object-Oriented Metrics in Practice (Lanza & Marinescu)

name: Detect Long Method Code Smell

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-long-method:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Qodana for JVM
        uses: JetBrains/qodana-action@v2024.3
        with:
          linter: jetbrains/qodana-jvm
          args: --profile-name,qodana.recommended
          upload-result: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
